description: This folder(task) runs the cid extractor, extracts tables and paragraphs, translates them and writes as a text file.

ignore_docs: [ 202602161727190619.pdf, 202403131806082619.pdf, 202403181638378519.pdf, 202403271625233519.pdf, 202403281220430319.pdf, 202403281525440319.pdf, 202403281707264519.pdf, 202403281710019819.pdf, 202403281712521519.pdf, 202403281715217919.pdf, 202408231529296219.pdf, 202411271716499019.pdf, 202412201535443819.pdf, 202503031833000719.pdf, 202503031837541919.pdf, 202503121600075019.pdf, 202503261808470119.pdf, 202504091352088919.pdf, 202505191321580719.pdf, 202505231606164319.pdf, 202505231616280319.pdf, 202506201620242619.pdf, 202506201623464419.pdf, 202507231505384819.pdf, 202507251806500619.pdf, 202507311718427019.pdf, 202508191431084219.pdf, 202509041209590619.pdf, 202509121725540319.pdf, 202511061555482419.pdf, 202511142131529919.pdf, 202512172208002319.pdf, 202512261646191119.pdf, 202602131606014119.pdf ]

output_dir: 'output'
config_dir: 'conf'
output_stub: 'doc'

pipeline:
  - name: pdf_cid_info

  - name: pdf_cid_reader
    config:
        swap_cids: [['sakalmarathi', 66, 126]] # u and dot (mumbai)

  - name: word_recognizer

  - name: pdftable_finder
    config:
      skip_row_with_merged_cells: False
      heading_offset: 0 # ignore heading
      header_row: never
      pdfplumber_config:
        vertical_strategy: lines
        horizontal_strategy: lines

  - name: line_finder
    config:
      keep_empty_lines: True
      quick: True
      newline_height_multiple: 1.6

  - name: para_finder
    config:
      write_output: False

  - name: extract_order_number      

  - name: doc_translator_hf
    config:
      src_lang: 'mar_Deva'
      tgt_lang: 'eng_Latn'

  - name: text_writer
    config:
      languages: ['en', 'mr']
